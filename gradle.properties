# 1. Mengaktifkan AndroidX (Library UI Android terbaru)
android.useAndroidX=true

# 2. Mengonversi otomatis library lama agar kompatibel dengan AndroidX
android.enableJetifier=true

# 3. Pengaturan memori untuk proses build agar tidak lemot/error
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# 4. Mempercepat proses build dengan menjalankan tugas secara paralel
org.gradle.parallel=true

# 5. Mengaktifkan cache untuk build yang lebih cepat di masa depan
org.gradle.caching=true
