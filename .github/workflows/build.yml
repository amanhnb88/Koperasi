name: Build Android APK

# Kapan aksi ini akan dijalankan? 
# Saat ada push ke branch 'main' atau saat ditekan manual (workflow_dispatch)
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Mengambil kodemu dari repositori
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Menyiapkan Java versi 17 (Syarat untuk Android Gradle Plugin 8.2.0)
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Menyiapkan Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 4. Membangun (Build) APK versi Debug
      # Kita menggunakan perintah 'gradle' langsung karena tidak ada 'gradlew'
      - name: Build Debug APK
        run: gradle assembleDebug

      # 5. Mengunggah hasil APK agar bisa kamu download
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KSP-Semy-Riry-App
          path: app/build/outputs/apk/debug/app-debug.apk
